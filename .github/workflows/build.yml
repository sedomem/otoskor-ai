name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Prepare Web Content
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ 2>/dev/null || true

      - name: Capacitor Sync
        run: |
          npx cap init "OtoSkor AI" "com.otoskor.ai" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Patch Android Project for SDK 35
        run: |
          cd android
          # 1. SDK Versiyonlarını Güncelle (variables.gradle üzerinden)
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 35/g' variables.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/g' variables.gradle
          
          # 2. Splash Screen hatası için gerekli kütüphaneyi ekle
          sed -i '/dependencies {/a \    implementation "androidx.core:core-splashscreen:1.0.1"' app/build.gradle
          
          # 3. Android Gradle Plugin (AGP) versiyonunu yükselt
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.2.2/g' build.gradle
          
          # 4. SDK 35 uyarılarını sustur
          echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties
          
          # 5. Sürüm Kodunu Güncelle (Google Play kabulü için)
          sed -i 's/versionCode [0-9]*/versionCode 18/g' app/build.gradle
          sed -i 's/versionName "[0-9.]*"/versionName "2.8.0"/g' app/build.gradle

      - name: Build Android Bundle
        run: |
          cd android
          # Keystore ve Google Services
          printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /home/runner/otoskor.keystore
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          
          # Gradle Wrapper Güncelle ve Derle
          ./gradlew wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: otoskor-v18-fixed
          path: android/app/build/outputs/bundle/release/*.aab
