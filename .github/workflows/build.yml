- name: Sign AAB
        run: |
          # Keystore dosyasını oluştur
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          
          # Hata ayıklama için: Alias listesini kontrol et (Opsiyonel, sadece loglarda görmen için)
          keytool -list -v -keystore release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}"
          
          # jarsigner ile imzala (KEY_PASSWORD'ün dolu olduğundan emin ol)
          jarsigner -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -digestalg SHA-256 \
            -sigalg SHA256withRSA \
            android/app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload Signed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: otoskor-v21-signed
          path: android/app/build/outputs/bundle/release/app-release.aab
