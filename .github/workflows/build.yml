name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          # Ana dizindeki dosyaları www içine kopyalıyoruz
          cp index.html www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || true
          if [ -d "assets" ]; then cp -r assets www/; fi

      - name: Init Capacitor
        run: |
          npx cap init "OtoSkor AI" "com.otoskor.ai" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Decode Secrets
        run: |
          printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /home/runner/otoskor.keystore
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Fix Manifest and Styles
        run: |
          sed -i 's/AppTheme.NoActionBarLaunch/Theme.SplashScreen/g' android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#3caff6</item>
                  <item name="colorPrimaryDark">#101b22</item>
                  <item name="colorAccent">#3caff6</item>
              </style>
              <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>
              <style name="Theme.SplashScreen" parent="Theme.SplashScreen.IconBackground">
                  <item name="windowSplashScreenBackground">#101b22</item>
                  <item name="postSplashScreenTheme">@style/AppTheme.NoActionBar</item>
              </style>
          </resources>
          EOF

      - name: Build AAB (Version 12)
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'com.google.gms.google-services'

          android {
              namespace "com.otoskor.ai"
              compileSdkVersion 35
              defaultConfig {
                  applicationId "com.otoskor.ai"
                  minSdkVersion 22
                  targetSdkVersion 35
                  versionCode 12
                  versionName "2.2"
              }
              signingConfigs {
                  release {
                      storeFile file('/home/runner/otoskor.keystore')
                      storePassword 'otoskor2024'
                      keyAlias 'otoskor'
                      keyPassword 'otoskor2024'
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }

          dependencies {
              implementation project(':capacitor-android')
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.firebase:firebase-messaging:23.4.0'
              implementation 'androidx.core:core-splashscreen:1.0.1'
          }
          EOF
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: otoskor-final-v12
          path: android/app/build/outputs/bundle/release/*.aab
