name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare web dir
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ 2>/dev/null || true
          cp sw.js www/ 2>/dev/null || true
          cp icon-192.png www/ 2>/dev/null || true

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Init Capacitor
        run: |
          npx cap init "OtoSkor AI" "com.otoskor.ai" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Fix Kotlin duplicate dependency
        run: |
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          EOF

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /home/runner/otoskor.keystore
          echo "Keystore size: $(wc -c < /home/runner/otoskor.keystore) bytes"
          file /home/runner/otoskor.keystore

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storeFile=/home/runner/otoskor.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          EOF

      - name: Patch build.gradle with signing config
        run: |
          cat > /tmp/patch.py << 'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_block = '''
              signingConfigs {
                  release {
                      def props = new Properties()
                      def propsFile = rootProject.file('keystore.properties')
                      if (propsFile.exists()) { props.load(new FileInputStream(propsFile)) }
                      storeFile file(props.getProperty('storeFile', ''))
                      storePassword props.getProperty('storePassword', '')
                      keyAlias props.getProperty('keyAlias', '')
                      keyPassword props.getProperty('keyPassword', '')
                  }
              }
          '''

          if 'signingConfigs' not in content:
              content = content.replace('android {', 'android {' + signing_block, 1)

          if 'signingConfig signingConfigs.release' not in content:
              content = content.replace(
                  'release {\n',
                  'release {\n            signingConfig signingConfigs.release\n',
                  1
              )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("SUCCESS: build.gradle patched")
          PYEOF
          python3 /tmp/patch.py

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: otoskor-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
