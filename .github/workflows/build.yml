name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Prepare web dir
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ 2>/dev/null || true
          cp sw.js www/ 2>/dev/null || true
          cp icon-192.png www/ 2>/dev/null || true

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        run: |
          npx cap init "OtoSkor AI" "com.otoskor.ai" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: |
          # printf kullanarak görünmez karakter hatasını (invalid input) engelledik
          printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/otoskor.keystore

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          # clean ekleyerek eski kalıntıları sildik, --no-daemon ile stabiliteyi artırdık
          ./gradlew clean bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=otoskor.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: otoskor-release
          path: android/app/build/outputs/bundle/release/*.aab
