name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare web dir
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ 2>/dev/null || true
          cp sw.js www/ 2>/dev/null || true
          cp icon-192.png www/ 2>/dev/null || true

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Init Capacitor
        run: |
          npx cap init "OtoSkor AI" "com.otoskor.ai" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Fix Kotlin duplicate dependency
        run: |
          cd android
          cat >> app/build.gradle << 'EOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          EOF

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/otoskor.keystore
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/otoskor.keystore" >> $GITHUB_ENV

      - name: Verify Keystore exists
        run: |
          ls -la $GITHUB_WORKSPACE/otoskor.keystore
          echo "Keystore size: $(wc -c < $GITHUB_WORKSPACE/otoskor.keystore) bytes"

      - name: Inject signing config into build.gradle
        run: |
          cd android
          # release signing config'i app/build.gradle'a enjekte et
          cat > app/keystore.properties << EOF
          storeFile=$GITHUB_WORKSPACE/otoskor.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          EOF

          # build.gradle'ı signing config ile güncelle
          python3 << 'PYEOF'
          import re

          with open('app/build.gradle', 'r') as f:
              content = f.read()

          signing_config = """
              signingConfigs {
                  release {
                      def props = new Properties()
                      props.load(new FileInputStream(rootProject.file('../app/keystore.properties')))
                      storeFile file(props['storeFile'])
                      storePassword props['storePassword']
                      keyAlias props['keyAlias']
                      keyPassword props['keyPassword']
                  }
              }
          """

          # android { bloğunun hemen içine ekle
          content = content.replace('android {', 'android {' + signing_config, 1)

          # buildTypes release'e signingConfig ekle
          content = content.replace(
              'release {',
              'release {\n            signingConfig signingConfigs.release',
              1
          )

          with open('app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle updated successfully")
          PYEOF

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: otoskor-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
