name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare web dir
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ 2>/dev/null || true
          cp sw.js www/ 2>/dev/null || true
          cp icon-192.png www/ 2>/dev/null || true

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Init Capacitor
        run: |
          npx cap init "OtoSkor AI" "com.otoskor.ai" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /home/runner/otoskor.keystore
          echo "Keystore size: $(wc -c < /home/runner/otoskor.keystore) bytes"

      - name: Overwrite app build.gradle
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "com.otoskor.ai"
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.otoskor.ai"
                  minSdkVersion 22
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file('/home/runner/otoskor.keystore')
                      storePassword 'otoskor2024'
                      keyAlias 'otoskor'
                      keyPassword 'otoskor2024'
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }

          repositories {
              flatDir {
                  dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
              }
          }

          dependencies {
              implementation fileTree(include: ['*.jar'], dir: 'libs')
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
              implementation 'androidx.core:core-splashscreen:1.0.1'
          }
          EOF

      - name: Fix SplashScreen theme in styles.xml
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>

              <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
                  <item name="windowActionBar">false</item>
                  <item name="windowNoTitle">true</item>
              </style>

              <style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">
                  <item name="windowSplashScreenBackground">#101b22</item>
                  <item name="windowSplashScreenAnimatedIcon">@mipmap/ic_launcher</item>
                  <item name="postSplashScreenTheme">@style/AppTheme.NoActionBar</item>
              </style>

              <style name="Theme.SplashScreen" parent="Theme.SplashScreen.IconBackground">
                  <item name="windowSplashScreenBackground">#101b22</item>
                  <item name="windowSplashScreenAnimatedIcon">@mipmap/ic_launcher</item>
                  <item name="postSplashScreenTheme">@style/AppTheme</item>
              </style>
          </resources>
          EOF

          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#3caff6</color>
              <color name="colorPrimaryDark">#101b22</color>
              <color name="colorAccent">#3caff6</color>
          </resources>
          EOF

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: otoskor-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
