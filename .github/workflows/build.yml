name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Prepare Web Content
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ 2>/dev/null || true

      - name: Capacitor Sync
        run: |
          npx cap init "OtoSkor AI" "com.otoskor.ai" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Build Android Bundle (SDK 35 FIX)
        run: |
          # Gradle wrapper versiyonunu yükseltiyoruz (SDK 35 desteği için şart)
          cd android
          ./gradlew wrapper --gradle-version 8.4
          
          # build.gradle dosyasını modern standartlara göre yeniden yazıyoruz
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'com.google.gms.google-services'

          android {
              namespace "com.otoskor.ai"
              compileSdkVersion 35
              
              defaultConfig {
                  applicationId "com.otoskor.ai"
                  minSdkVersion 22
                  targetSdkVersion 35
                  versionCode 15
                  versionName "2.5.0"
              }
              
              signingConfigs {
                  release {
                      storeFile file('/home/runner/otoskor.keystore')
                      storePassword 'otoskor2024'
                      keyAlias 'otoskor'
                      keyPassword 'otoskor2024'
                  }
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              
              // AAPT2 hata suppressor (SDK 35 uyumluluğu için)
              options {
                  printf "android.suppressUnsupportedCompileSdk=35" >> "../gradle.properties"
              }
          }
          
          dependencies {
              implementation project(':capacitor-android')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          # Keystore decode
          printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /home/runner/otoskor.keystore
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: otoskor-sdk35-v15
          path: android/app/build/outputs/bundle/release/*.aab
