name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Prepare Web Content
        run: |
          mkdir -p www
          # Klasördeki .html uzantılı dosyayı bul ve index.html olarak kopyala
          # Bu sayede 'car_analysis_tr (1).html' ismindeki boşluklar sorun yaratmaz
          find . -maxdepth 1 -name "*.html" -exec cp {} www/index.html \;
          cp manifest.json www/ 2>/dev/null || true

      - name: Capacitor Sync
        run: |
          npx cap init "OtoSkor AI" "com.otoskor.ai" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Patch Gradle and SDK 35
        run: |
          cd android
          # Gradle sürümünü 8.4'e zorla
          sed -i 's/gradle-8.0.2-all.zip/gradle-8.4-all.zip/g' gradle/wrapper/gradle-wrapper.properties
          
          # Android SDK ve Build araçlarını güncelle
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 35/g' variables.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/g' variables.gradle
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.2.2/g' build.gradle
          
          # Eksik Splash Screen kütüphanesini ekle
          sed -i '/dependencies {/a \    implementation "androidx.core:core-splashscreen:1.0.1"' app/build.gradle
          echo "android.suppressUnsupportedCompileSdk=35" >> gradle.properties
          
          # Versiyon numarasını yükselt (Play Store uyumu için)
          sed -i 's/versionCode [0-9]*/versionCode 20/g' app/build.gradle

      - name: Build Android Bundle
        run: |
          cd android
          # Keystore ve Google Services (Secrets'tan oku)
          printf "%s" "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /home/runner/otoskor.keystore
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: otoskor-final-v20
          path: android/app/build/outputs/bundle/release/*.aab
