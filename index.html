<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>OtoSkor AI</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4933924775439498" crossorigin="anonymous"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--bg:#101b22;--bg2:#152232;--bg3:#1e3348;--pr:#3caff6;--tx:#e8f4fd;--mu:#7fb3d3;--dim:#4a7a9b;--rd:#ef4444;--br:rgba(60,175,246,.14);--r:14px;--r2:10px;--sb:env(safe-area-inset-bottom,0px)}
        html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1520;color:var(--tx)}
        .app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg)}
        #loginApp{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;min-height:100%}
        .llogo{font-size:36px;font-weight:900;color:var(--pr);margin-bottom:4px}
        .atabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;width:100%;margin-bottom:16px}
        .atab{flex:1;padding:9px;border:none;background:transparent;color:var(--mu);font-weight:700;border-radius:8px}
        .atab.on{background:var(--bg2);color:var(--pr)}
        .hdr{height:56px;background:var(--bg2);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
        .cont{flex:1;overflow-y:auto;padding-bottom: 80px}
        .scr{display:none;padding:16px}
        .scr.on{display:block}
        .bnav{height:calc(62px + var(--sb));background:var(--bg2);border-top:1px solid var(--br);display:flex;padding-bottom:var(--sb)}
        .ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent;border:none;color:var(--dim);font-size:10px;font-weight:700}
        .ni.on{color:var(--pr)}
        .inp{background:var(--bg2);border:1px solid var(--br);color:var(--tx);padding:13px;border-radius:var(--r2);width:100%;margin-bottom:10px;outline:none}
        .bp{width:100%;background:var(--pr);color:var(--bg);border:none;padding:15px;border-radius:var(--r);font-size:16px;font-weight:800;cursor:pointer}
        .ubox{border:2px dashed var(--br);border-radius:var(--r);padding:20px;text-align:center;background:var(--bg2);margin-bottom:12px}
        .uphoto{max-width:100%;max-height:160px;border-radius:8px;margin-top:10px;display:none}
        .ad-banner{position:fixed;bottom:calc(62px + var(--sb));left:0;right:0;height:50px;background:var(--bg2);display:flex;justify-content:center;align-items:center;border-top:1px solid var(--br);z-index:100}
    </style>
</head>
<body>

<div class="app" id="loginApp">
    <div class="llogo">OtoSkor AI</div>
    <div class="atabs">
        <button class="atab on" id="tab-in" onclick="setTab('in')">Giriş Yap</button>
        <button class="atab" id="tab-up" onclick="setTab('up')">Kayıt Ol</button>
    </div>
    <div class="lform" style="width:100%; max-width:360px">
        <button class="bp" style="background:var(--bg3); color:var(--tx); margin-bottom:10px" onclick="guestLogin()">👤 Misafir Devam Et</button>
        <div id="namew" style="display:none"><input class="inp" id="l-name" placeholder="Ad Soyad"></div>
        <input class="inp" id="l-em" type="email" placeholder="E-posta">
        <input class="inp" id="l-pw" type="password" placeholder="Şifre">
        <button class="bp" onclick="authSub()">Devam Et</button>
    </div>
</div>

<div class="app" id="mainApp" style="display:none">
    <header class="hdr">
        <div class="logo" style="font-weight:900; color:var(--pr)">OtoSkor AI</div>
        <div style="color:var(--yw); font-weight:800; font-size:12px;">v23 PRO</div>
    </header>

    <div class="cont">
        <div class="scr on" id="scr-home">
            <h2 style="margin-bottom:10px">Araç Analizi</h2>
            <input class="inp" placeholder="Marka">
            <input class="inp" placeholder="Model">
            <input class="inp" placeholder="Yıl" inputmode="numeric">
            <div class="ubox" onclick="document.getElementById('file-home').click()">
                <input type="file" id="file-home" style="display:none" onchange="handleImg(this, 'pv-home')">
                <span>📷 Fotoğraf Ekle</span>
                <img id="pv-home" class="uphoto">
            </div>
            <button class="bp" onclick="startAnalysis()">Analiz Et ve Reklamı Gör</button>
        </div>

        <div class="scr" id="scr-photo">
            <h2>AI Hasar Tespiti</h2>
            <div class="ubox" style="height:150px; display:flex; align-items:center; justify-content:center" onclick="document.getElementById('file-ai').click()">
                <input type="file" id="file-ai" style="display:none" onchange="handleImg(this, 'pv-ai')">
                <span>📸 Hasar Fotoğrafı Yükle</span>
                <img id="pv-ai" class="uphoto">
            </div>
            <button class="bp" onclick="startAnalysis()">AI Taramayı Başlat</button>
        </div>

        <div class="scr" id="scr-history"><h2>Geçmiş</h2><div style="text-align:center; margin-top:20px; opacity:0.5">Kayıt yok.</div></div>
        <div class="scr" id="scr-settings"><h2>Ayarlar</h2><button class="bp" onclick="location.reload()" style="margin-top:20px; background:var(--rd)">Çıkış Yap</button></div>
    </div>

    <div class="ad-banner">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-pub-4933924775439498"
             data-ad-slot="5319811568"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <nav class="bnav">
        <button class="ni on" onclick="navigate('home')">🏠<span>Ana Sayfa</span></button>
        <button class="ni" onclick="navigate('photo')">📷<span>AI Tara</span></button>
        <button class="ni" onclick="navigate('history')">🕒<span>Geçmiş</span></button>
        <button class="ni" onclick="navigate('settings')">⚙️<span>Ayarlar</span></button>
    </nav>
</div>

<script>
    // Geçiş Reklamı (Interstitial) Fonksiyonu
    function showInterstitial() {
        // Not: Gerçek cihazda Capacitor AdMob eklentisi yüklü olmalıdır.
        // Web ortamında veya testte sadece log basar ve simüle eder.
        console.log("Geçiş Reklamı Tetiklendi: ca-app-pub-4933924775439498/5502787883");
        alert("Reklam Simülasyonu: Geçiş reklamı yükleniyor...");
    }

    function startAnalysis() {
        // Önce reklamı göster (veya yükle)
        showInterstitial();
        // Ardından asıl işlemi yap
        setTimeout(() => {
            alert("Analiz sonuçları hazırlanıyor...");
        }, 1000);
    }

    function navigate(id) {
        document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
        const target = document.getElementById('scr-' + id);
        if(target) target.classList.add('on');
        document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
        event.currentTarget.classList.add('on');
    }

    function setTab(type) {
        document.getElementById('namew').style.display = (type === 'up') ? 'block' : 'none';
        document.getElementById('tab-in').classList.toggle('on', type === 'in');
        document.getElementById('tab-up').classList.toggle('on', type === 'up');
    }

    function guestLogin() {
        document.getElementById('loginApp').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
    }

    function authSub() {
        const email = document.getElementById('l-em').value;
        if(email.includes('@')) guestLogin();
        else alert('Geçerli bir e-posta girin.');
    }

    function handleImg(input, imgId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(imgId);
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
