<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>OtoSkor AI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3caff6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="OtoSkor AI">
<style>
/* TÜM ORİJİNAL CSS KODLARIN */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#101b22;--bg2:#152232;--bg3:#1e3348;--pr:#3caff6;--pdim:rgba(60,175,246,.12);--phd:rgba(60,175,246,.22);--tx:#e8f4fd;--mu:#7fb3d3;--dim:#4a7a9b;--gn:#22c55e;--gbg:rgba(34,197,94,.12);--gbr:rgba(34,197,94,.28);--yw:#f59e0b;--ybg:rgba(245,158,11,.12);--ybr:rgba(245,158,11,.28);--rd:#ef4444;--rbg:rgba(239,68,68,.12);--rbr:rgba(239,68,68,.28);--br:rgba(60,175,246,.14);--bh:rgba(60,175,246,.24);--r:14px;--r2:10px;--sb:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1520;color:var(--tx);font-size:15px}
.app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:var(--bg);overscroll-behavior:none}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;min-height:100%;overflow-y:auto}
.llogo{font-size:36px;font-weight:900;color:var(--pr);margin-bottom:4px;letter-spacing:-1px}
.lsub{font-size:13px;color:var(--mu);margin-bottom:24px;text-align:center}
.atabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;width:100%;max-width:360px;margin-bottom:16px}
.atab{flex:1;padding:9px;border:none;background:transparent;color:var(--mu);font-size:14px;font-weight:700;cursor:pointer;border-radius:8px;transition:.2s}
.atab.on{background:var(--bg2);color:var(--pr);border:1px solid var(--br)}
.lform{width:100%;max-width:360px;display:flex;flex-direction:column;gap:9px}
.gbtn{background:var(--bg3);border:1px solid var(--bh);color:var(--tx);padding:13px;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;width:100%}
.hdr{flex-shrink:0;height:56px;background:var(--bg2);border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:between;padding:0 16px;z-index:20}
.logo{font-size:18px;font-weight:900;color:var(--pr)}
.cont{flex:1;overflow-y:auto;padding-bottom:80px}
.scr{display:none;padding:16px}.scr.on{display:block}
.bnav{position:fixed;bottom:0;width:100%;max-width:430px;height:calc(62px + var(--sb));background:var(--bg2);border-top:1px solid var(--br);display:flex;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);font-size:10px;border:none;background:none}
.ni.on{color:var(--pr)}
.inp{background:var(--bg2);border:1px solid var(--br);color:var(--tx);padding:13px;border-radius:10px;width:100%;margin-bottom:10px}
.bp{width:100%;background:var(--pr);color:var(--bg);border:none;padding:15px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer}
.card{background:var(--bg2);border:1px solid var(--br);border-radius:14px;padding:16px;margin-bottom:12px}
/* ... Diğer zengin CSS'lerin buraya dahil edilebilir ... */
</style>
</head>
<body>

<div class="app" id="loginApp">
    <div id="login">
        <div class="llogo">OtoSkor AI</div>
        <div class="lsub">Türkiye'nin akıllı araç analiz uygulaması</div>
        <div class="atabs">
            <button class="atab on" onclick="setTab('in')">Giriş Yap</button>
            <button class="atab" onclick="setTab('up')">Kayıt Ol</button>
        </div>
        <div class="lform">
            <button class="gbtn" onclick="appEnter()">👤 Misafir Olarak Devam Et</button>
            <input class="inp" type="email" placeholder="E-posta">
            <input class="inp" type="password" placeholder="Şifre">
            <button class="bp" onclick="appEnter()">Giriş Yap</button>
        </div>
    </div>
</div>

<div class="app" id="mainApp" style="display:none">
    <header class="hdr">
        <div class="logo">OtoSkor AI</div>
        <div class="fbdg">3/3 Kredi</div>
    </header>

    <div class="cont">
        <div class="scr on" id="scr-home">
            <div style="font-size:20px; font-weight:800; margin-bottom:15px;">Araç Analizi</div>
            <div class="card">
                <input class="inp" placeholder="Marka (ör. Toyota)">
                <input class="inp" placeholder="Model (ör. Corolla)">
                <input class="inp" placeholder="Yıl (ör. 2019)">
                <button class="bp">Analiz Et</button>
            </div>
        </div>

        <div class="scr" id="scr-photo">
            <div style="font-size:20px; font-weight:800; margin-bottom:15px;">Fotoğrafla Tara</div>
            <div class="card" style="text-align:center; padding:40px 20px;">
                <div style="font-size:40px;">📷</div>
                <div style="margin-top:10px; color:var(--mu);">Fotoğraf Yükle veya Çek</div>
            </div>
        </div>
    </div>

    <nav class="bnav">
        <button class="ni on" onclick="showScr('home')">🏠<div>Analiz</div></button>
        <button class="ni" onclick="showScr('photo')">📷<div>Fotoğraf</div></button>
        <button class="ni" onclick="showScr('history')">📜<div>Geçmiş</div></button>
        <button class="ni" onclick="showScr('settings')">⚙️<div>Ayarlar</div></button>
    </nav>
</div>

<script src="capacitor.js"></script>

<script>
    // Giriş Fonksiyonu
    function appEnter() {
        document.getElementById('loginApp').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
    }

    // Ekran Değiştirme Fonksiyonu
    function showScr(id) {
        // Tüm ekranları kapat
        document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
        // Hedef ekranı aç
        document.getElementById('scr-' + id).classList.add('on');
        
        // Menü ikonlarını güncelle
        document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
        event.currentTarget.classList.add('on');
    }

    function setTab(type) {
        console.log("Tab: " + type);
    }

    window.onload = () => {
        console.log("OtoSkor AI Başlatıldı");
    };
</script>
</body>
</html>
